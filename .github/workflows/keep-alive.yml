name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping app (always succeeds)
        run: |
          URL="https://catheringcc-cyber-stock-screener-app-b0xk6n.streamlit.app/"
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" --max-time 60 "$URL" || echo "0")
          echo "Pinged · status=$STATUS"
          # Never exit non-zero — Streamlit Cloud auth redirects cause false 303s.
          # The ping itself wakes the app regardless of what curl reports.
          exit 0
